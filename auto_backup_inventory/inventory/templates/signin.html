<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Automated Backup Tape Inventory Management System</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg, #0d6efd, #001f54);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card{
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            overflow: hidden;
            animation: slideUp 1s ease;
        }

        .card-header{
            text-align: center;
            padding: 25px;
            background: #0d6efd;
            color: white;
        }

        .logo{
            font-size: 60px;
        }

        .card-body{
            padding: 35px;
        }

        .btn-login{
            width: 100%;
            padding: 12px;
            font-weight: bold;
        }

        @keyframes slideUp{
            from{
                opacity: 0;
                transform: translateY(50px);
            }
            to{
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="card shadow-lg login-card">

    <div class="card-header">
        <div class="logo"> 
            <img src="{% static 'inventory/round.jpg' %}" alt="logo" width="100" height="100" style="padding-bottom:20px; border-radius:10px; box-shadow:0 0 10px rgba(255,255,255,0.5);">
        </div>
        <h3>Backup Tape Inventory</h3>
        <small>Secure Tape Management System</small>
    </div>

    <div class="card-body">

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Enter Username"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Enter Password"
                    required>
            </div>

            <div class="mb-3 form-check">
                <input
                    type="checkbox"
                    class="form-check-input"
                    id="remember">
                <label class="form-check-label" for="remember">
                    Remember Me
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-login">
                Sign In
            </button>

        </form>

        <div class="text-center mt-3">
            <a href="#" class="text-decoration-none">
                Forgot Password?
            </a>
        </div>

    </div>

    <div class="card-footer text-center text-muted">
        Automated Backup Tape Inventory Management System
    </div>

</div>

</body>
</html>

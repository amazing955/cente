<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Shipment Compliance Review</title></head>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<body>
<div style="font-family: Arial, sans-serif; padding: 24px;">
    <h2>Shipment Compliance Review</h2>
    <table class="table table-striped table-sm" border="1" cellpadding="6" cellspacing="0">
        <tr><th>Shipment ID</th><th>Manifest</th><th>Courier</th><th>Compliance Status</th></tr>
        {% for row in shipment_rows %}
        <tr><td>{{ row.shipment_id }}</td><td>{{ row.manifest_number }}</td><td>{{ row.courier }}</td><td>{{ row.compliance_status }}</td></tr>
        {% empty %}<tr><td colspan="4">No shipments.</td></tr>{% endfor %}
    </table>
</div>
</body>
</html>

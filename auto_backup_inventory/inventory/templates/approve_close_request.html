<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Approve Close Request</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <h4>Review Close Request</h4>
    <p class="text-muted">Exception ID: <strong>{{ close_request.exception.exception_id }}</strong></p>
    <p>Requested by: <strong>{{ close_request.requested_by.get_full_name|default:close_request.requested_by.username }}</strong></p>
    <div class="card mb-3">
        <div class="card-body">
            <h6 class="card-title">Investigation Results</h6>
            <p class="card-text">{{ close_request.investigation_results|linebreaksbr }}</p>
        </div>
    </div>

    <form method="post" action="">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Admin Remark</label>
            <textarea name="approval_comment" class="form-control" rows="4" placeholder="Add your remark for the requester...">{{ close_request.approval_comment }}</textarea>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" name="action" value="approve" class="btn btn-success">Approve and Close</button>
            <button type="submit" name="action" value="reject" class="btn btn-outline-danger">Reject</button>
            <a href="{% url 'backup-dashboard' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

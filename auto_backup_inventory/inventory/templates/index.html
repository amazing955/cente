<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Backup Tape Inventory Management System</title>

    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: #023586;
            overflow:hidden;
            margin:0;
        }

        .splash-container{
            text-align:center;
            color:#ffffff;
            display:flex;
            flex-direction:column;
            align-items:center;
            transition:opacity 0.4s ease, transform 0.4s ease;
        }

        .splash-container.is-fading-out{
            opacity:0;
            transform:scale(0.98);
        }

        .loader-visual{
            position:relative;
            display:flex;
            align-items:center;
            justify-content:center;
            width:10px;
            height:220px;
            margin-bottom:18px;
        }

        .loader-ring{
            width:220px;
            height:220px;
            transform:rotate(-90deg);
        }

        .loader-ring-track,
        .loader-ring-progress{
            fill:none;
            stroke-width:12;
        }

        .loader-ring-track{
            stroke:#023586;
        }

        .loader-ring-progress{
            stroke:#E5E5E5;
            stroke-linecap:round;
            stroke-dasharray:365;
            stroke-dashoffset:365;
            transition:stroke-dashoffset 0.05s linear;
        }

        .logo{
            position:absolute;
            inset:0;
            display:flex;
            align-items:center;
            justify-content:center;
            pointer-events:none;
        }

        .logo img{
            width:300px;
            height:300px;
            object-fit:contain;
            padding-bottom:0;
            border-radius:10px;
        }

        .title{
            font-size:2rem;
            font-weight:bold;
            margin-top:8px;
            animation:fadeIn 2s ease-in-out;
        }

        .subtitle{
            font-size:1rem;
            margin-top:10px;
            animation:fadeIn 3s ease-in-out;
        }

        .loader{
            width:min(280px, 70vw);
            margin:20px auto 10px;
        }

        .progress-bar{
            width:0%;
            transition:width 0.05s linear;
        }

        .status-text{
            margin:0;
            font-size:1rem;
            font-weight:600;
            letter-spacing:0.02em;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
            }
            to{
                opacity:1;
            }
        }

        @keyframes fadeOutLoader{
            from{
                opacity:1;
                transform:scale(1);
            }
            to{
                opacity:0;
                transform:scale(0.98);
            }
        }

        @media (max-width:576px){
            .loader-visual{
                width:180px;
                height:180px;
            }

            .loader-ring{
                width:180px;
                height:180px;
            }

            .logo img{
                width:112px;
                height:120px;
            }

            .title{
                font-size:1.5rem;
            }

            .subtitle{
                font-size:0.95rem;
            }
        }
    </style>
</head>
<body>

<div class="splash-container" id="splash-container">

    <div class="loader-visual">
        <svg class="loader-ring" viewBox="0 0 140 140" aria-hidden="true">
            <circle class="loader-ring-track" cx="70" cy="70" r="58"></circle>
            <circle id="loader-ring-progress" class="loader-ring-progress" cx="70" cy="70" r="58"></circle>
        </svg>
        <div class="logo">
            <img src="{% static 'inventory/lo.png' %}" alt="logo">
        </div>
    </div>

    <div class="title">
        Bank Automated Backup Tape Inventory
    </div>

    <div class="subtitle">
        Secure • Track • Manage • Audit
    </div>

    <div class="progress loader" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <div id="horizontal-progress-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-primary"></div>
    </div>

    <p id="status-text" class="status-text">Loading System...</p>

</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const splashContainer = document.getElementById('splash-container');
        const ringProgress = document.getElementById('loader-ring-progress');
        const horizontalProgressBar = document.getElementById('horizontal-progress-bar');
        const statusText = document.getElementById('status-text');
        const totalDuration = 5000;
        const intervalMs = 50;
        const circumference = 2 * Math.PI * 58;
        const startTime = Date.now();
        let progressValue = 0;
        let completed = false;

        function updateProgress(value) {
            progressValue = Math.min(100, Math.max(0, value));
            horizontalProgressBar.style.width = `${progressValue}%`;
            horizontalProgressBar.setAttribute('aria-valuenow', progressValue);
            const ringOffset = circumference * (1 - progressValue / 100);
            ringProgress.style.strokeDashoffset = ringOffset;
        }

        updateProgress(0);

        const progressTimer = setInterval(function() {
            const elapsed = Date.now() - startTime;
            const nextProgress = (elapsed / totalDuration) * 100;
            updateProgress(nextProgress);

            if (progressValue >= 100 && !completed) {
                completed = true;
                clearInterval(progressTimer);
                statusText.textContent = 'Loading Complete...';

                setTimeout(function() {
                    splashContainer.classList.add('is-fading-out');
                    setTimeout(function() {
                        window.location.href = "{% url 'signin' %}";
                    }, 300);
                }, 300);
            }
        }, intervalMs);
    });
</script>

</body>
</html>

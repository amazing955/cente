<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Backup Tape Inventory Management System</title>

    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: #023586;
            overflow:hidden;
        }

        .splash-container{
            text-align:center;
            color:rgb(255, 255, 255);
        }

        .logo{
            font-size:90px;
            animation:bounce 2s infinite;
        }

        .title{
            font-size:2rem;
            font-weight:bold;
            margin-top:20px;
            animation:fadeIn 2s ease-in-out;
        }

        .subtitle{
            font-size:1rem;
            margin-top:10px;
            animation:fadeIn 3s ease-in-out;
        }

        .loader{
            width:250px;
            margin:30px auto;
        }

        .progress-bar{
            animation:loading 5s linear forwards;
        }

        @keyframes bounce{
            0%,100%{
                transform:translateY(0);
            }
            50%{
                transform:translateY(-20px);
            }
        }

        @keyframes fadeIn{
            from{
                opacity:0;
            }
            to{
                opacity:1;
            }
        }

        @keyframes loading{
            from{
                width:0%;
            }
            to{
                width:100%;
            }
        }
    </style>
</head>
<body>

<div class="splash-container">

    <div class="logo">
        <img src="{% static 'inventory/lo.jpg' %}" alt="logo" width="300" height="150" style="padding-bottom:20px; border-radius:10px; box-shadow:0 0 10px rgba(255,255,255,0.5);">
    </div>

    <div class="title">
        Bank Automated Backup Tape Inventory
    </div>

    <div class="subtitle">
        Secure • Track • Manage • Audit
    </div>

    <div class="progress loader">
        <div class="progress-bar progress-bar-striped progress-bar-animated bg-primary"></div>
    </div>

    <p>Loading System...</p>

</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
            window.location.href = "{% url 'signin' %}";
        }, 5000);
    });
</script>

</body>
</html>

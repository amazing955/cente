<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete | Automated Backup Tape Inventory Management System</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #023586;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }
        .login-card {
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            overflow: hidden;
            animation: slideUp 0.8s ease;
        }
        .card-header {
            text-align: center;
            padding: 25px;
            background: #023586;
            color: white;
        }
        .logo {
            font-size: 60px;
        }
        .card-body {
            padding: 35px;
        }
        .btn-login {
            background: #023586 !important;
            border-color: #023586 !important;
            color: #fff !important;
            padding: 10px 16px;
            font-weight: bold;
        }
        .btn-login:hover,
        .btn-login:focus,
        .btn-login:active {
            background: #012b6d !important;
            border-color: #012b6d !important;
            box-shadow: 0 0 0 0.25rem rgba(2, 53, 134, 0.25);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="card shadow-lg login-card">
    <div class="card-header">
        <div class="logo">
            <img src="{% static 'inventory/lo.jpg' %}" alt="logo" width="140" height="100" style="padding-bottom:20px; border-radius:10px; box-shadow:0 0 10px rgba(255,255,255,0.5);">
        </div>
        <h3>Password Reset Complete</h3>
        <small>Secure Tape Management System</small>
    </div>
    <div class="card-body text-center">
        <p class="text-muted mb-4">Your password has been updated successfully.</p>
        <a href="{% url 'signin' %}" class="btn btn-login">Sign In</a>
    </div>
</div>
</body>
</html>

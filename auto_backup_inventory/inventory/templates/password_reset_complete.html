{% extends 'base.html' %}
{% block title %}Password Reset Complete{% endblock %}

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-body text-center">
                    <h4 class="card-title mb-3">Password Reset Complete</h4>

            </div>
        </div>
    </div>
</div>
{% endblock %}

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Backup Inventory{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: #f4f6f9;
            min-height: 100vh;
        }
        .page-header {
            border-bottom: 1px solid #e9ecef;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="{% url 'backup-dashboard' %}">Tape Inventory</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary" href="{% url 'backup-dashboard' %}"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a class="btn btn-outline-secondary" href="{% url 'reconciliation-reports' %}"><i class="bi bi-file-earmark-bar-graph"></i> Reconciliation Reports</a>
        </div>
    </div>
</nav>
<div class="container-fluid py-4">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

{% extends 'admin/base_site.html' %}
{% load i18n %}

{% block content %}
<div id="content-main">
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <fieldset class="module aligned">
      <h2>Upload Branch Excel</h2>
      <div class="form-row">
        <label for="id_excel_file">Select Excel file (.xlsx only)</label>
        <input type="file" name="excel_file" id="id_excel_file" accept=".xlsx" required>
      </div>
    </fieldset>
    <div class="submit-row">
      <input type="submit" value="Upload" class="default">
      <a href="{% url 'admin:inventory_bankbranch_changelist' %}" class="button cancel-link">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}

{% extends 'admin/change_list.html' %}
{% load i18n admin_urls static %}

{% block extrastyle %}
  {{ block.super }}
  <link rel="stylesheet" href="{% static 'inventory/jazzmin_admin.css' %}">
  <style>
    .btn-primary-gradient {
      background: linear-gradient(135deg, #0548ad 0%, #001f54 100%) !important;
      color: #ffffff !important;
      border: 1px solid #0548ad !important;
      border-radius: 10px !important;
      box-shadow: 0 4px 12px rgba(5,72,173,.25) !important;
      transition: all 0.3s ease !important;
    }
    .btn-primary-gradient:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 8px 20px rgba(5,72,173,.30) !important;
    }
    .btn-excel {
      color: #198754 !important;
      border: 1px solid #198754 !important;
      border-radius: 10px !important;
      background: transparent !important;
    }
    .btn-excel:hover {
      background: #198754 !important;
      color: #ffffff !important;
    }
    .btn-outline-custom {
      color: #0d6efd !important;
      border: 1px solid #0d6efd !important;
      border-radius: 10px !important;
      background: transparent !important;
    }
    .btn-outline-custom:hover {
      background: #0d6efd !important;
      color: #ffffff !important;
    }
    .btn-import {
      background: #198754 !important;
      color: #ffffff !important;
      border: 1px solid #198754 !important;
      border-radius: 10px !important;
    }
    .btn-cancel {
      background: #f8f9fa !important;
      color: #495057 !important;
      border: 1px solid #ced4da !important;
      border-radius: 10px !important;
    }
    .btn-cancel:hover {
      background: #fff5f5 !important;
      color: #dc3545 !important;
      border-color: #dc3545 !important;
    }
    .btn-toolbar.bankbranch-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin: 0 0 16px;
    }
    .btn-toolbar.bankbranch-toolbar a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
{% endblock %}

{% block object-tools-items %}
  {{ block.super }}
  {% if user.is_superuser %}
    <li class="bankbranch-action-card">
      <div class="btn-toolbar bankbranch-toolbar" role="toolbar" aria-label="Bank branch actions">
        <a href="{% url 'admin:inventory_bankbranch_upload_excel' %}" class="btn btn-primary-gradient" aria-label="Upload Branch Excel">
          <i class="bi bi-upload" aria-hidden="true"></i> Upload Branch file
        </a>
        <a href="{% url 'admin:inventory_bankbranch_download_template' %}" class="btn btn-excel" aria-label="Download Branch Template">
          <i class="bi bi-file-earmark-excel" aria-hidden="true"></i> Download Template
        </a>
        <a href="{% url 'admin:inventory_bankbranch_export_excel' %}" class="btn btn-outline-custom" aria-label="Export All Branches">
          <i class="bi bi-download" aria-hidden="true"></i> Export Branches
        </a>
      </div>
    </li>
  {% endif %}
{% endblock %}

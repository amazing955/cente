{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container-fluid p-4">
    <h4>Reports Dashboard</h4>
    <div class="row g-3 mt-3">
        {% for key, value in kpis.items %}
            <div class="col-md-3">
                <div class="card p-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="text-muted text-uppercase small">{{ key|capfirst }}</div>
                            <div class="fs-4 fw-bold">{{ value }}</div>
                        </div>
                        <div><i class="bi bi-graph-up-arrow fs-2"></i></div>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
    <div class="mt-4">
        <a href="{% url 'general-report' %}" class="btn btn-primary">Open General Report</a>
    </div>
</div>
{% endblock %}

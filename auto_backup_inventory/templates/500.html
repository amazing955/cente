<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #023586;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            padding: 24px;
        }
        .error-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 16px;
        }
        .error-image {
            width: min(240px, 70vw);
            max-width: 240px;
            border-radius: 24px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
        }
        .error-title {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
        }
        .error-text {
            max-width: 420px;
            margin: 0;
            opacity: 0.9;
        }
        .btn-home {
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="error-wrapper">
        <img src="{% static 'inventory/lo.png' %}" alt="Banking Logo" width="150" height="155" style="padding-bottom:20px; border-radius:10px;">
        <h1 class="error-title">Server error</h1>
        <p class="error-text">Something went wrong on our side. Please try again shortly or return home.</p>
        <a href="/" class="btn btn-light btn-home">Return home</a>
    </div>
</body>
</html>
